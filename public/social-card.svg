  </defs>
  <rect width="1200" height="630" fill="#f7f3e8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="935" cy="105" r="210" fill="#c6f000" opacity=".42"/>
  <circle cx="90" cy="570" r="160" fill="#22577a" opacity=".16"/>
