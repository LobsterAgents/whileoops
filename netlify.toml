[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "https://www.whileoops.com/*"
  to = "https://whileoops.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://whileloop.fail/*"
  to = "https://whileoops.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.whileloop.fail/*"
  to = "https://whileoops.com/:splat"
  status = 301
  force = true
