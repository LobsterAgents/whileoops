name: "Submit a #fail"
description: Share an AI agent fail, public reference, screenshot, video, or workflow oops for while(oops)
title: "[FAIL]: Short title here"
labels: ["submission", "needs-review"]
type: Task
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a fail.

        You only need to complete the form fields below. If GitHub shows extra metadata sections like Type, Priority, Projects, or Milestone, leave them as-is.

        Redact secrets, API keys, customer data, private URLs, internal company details, and screenshots that show anything sensitive. Submissions are reviewed before publishing.

        Public references are welcome from known social media, news, video, blog, or developer platforms: news articles, X/Twitter posts, TikToks, YouTube videos, GitHub issues, and reputable blog posts. Unknown file hosts, private links, pastebins, leaked docs, and unverifiable sources should not be submitted. Do not paste full copyrighted articles or private content. Add a short note and link to the original.

        You keep ownership of your submission. By submitting, you agree that accepted submissions may be published and reused under Creative Commons Attribution 4.0 International (CC BY 4.0): https://creativecommons.org/licenses/by/4.0/

  - type: dropdown
    id: submission-type
    attributes:
      label: Submission type
      options:
        - My own fail
        - Public reference
        - Screenshot or image
        - News article
        - X/Twitter post
        - TikTok or video
        - GitHub issue or PR
        - Other
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Infinite Loop
        - Tool Call Gone Wrong
        - Browser Automation Fail
        - Hallucinated Confidence
        - Token Bonfire
        - Human Had To Intervene
        - Other
    validations:
      required: true

  - type: textarea
    id: story
    attributes:
      label: What happened or why does this belong here?
      description: Tell the short version or explain what failed in the public reference. Funny details welcome. Confidential details are not.
      placeholder: The agent was supposed to... / This article belongs here because...
    validations:
      required: true

  - type: input
    id: reference-url
    attributes:
      label: Reference URL
      description: Optional. Paste a public link from a known social media, news, video, blog, or developer platform. Unknown file hosts, private links, pastebins, leaked docs, and unverifiable sources should not be submitted.
      placeholder: https://...

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or images
      description: Optional. Drag and drop or paste redacted images here. Remove secrets, customer data, internal URLs, private names, and anything confidential before uploading.
      placeholder: Paste or drag redacted screenshots here.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Funny
        - Expensive
        - Still Debugging
        - Human Rescue Required
        - Career-Limiting
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Tool or agent involved
      description: Optional. Public tool names are fine. Avoid private team/client names.
      placeholder: Browser agent, coding agent, internal workflow, etc.

  - type: textarea
    id: redaction-check
    attributes:
      label: Redaction check
      description: Confirm what you removed or anonymized.
      placeholder: I removed tokens, company names, customer data, and internal URLs.
    validations:
      required: true

  - type: checkboxes
    id: consent
    attributes:
      label: Publishing consent
      options:
        - label: I understand this may be published publicly after review.
          required: true
        - label: I own this submission or have the rights needed to submit it.
          required: true
        - label: I agree accepted submissions may be published and reused under CC BY 4.0.
          required: true
        - label: If I included a public reference, I linked to the original source instead of copying full copyrighted content.
          required: true
        - label: If I included a public reference, it is from a known social media, news, video, blog, or developer platform.
          required: true
        - label: I confirm any uploaded images are redacted and safe to publish.
          required: true
        - label: I confirm this submission does not include secrets, credentials, confidential data, or private personal information.
          required: true
